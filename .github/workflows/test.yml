name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: calculator_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d calculator_test_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/calculator_test_db
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/calculator_test_db

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: |
          playwright install --with-deps chromium

      - name: Create test-results directory
        run: mkdir -p test-results

      - name: Run unit tests
        run: |
          pytest tests/unit/ \
            -v \
            --cov=app \
            --cov-append \
            --cov-report=term-missing

      - name: Run integration tests
        run: |
          pytest tests/integration/ \
            -v \
            --cov=app \
            --cov-append \
            --cov-report=term-missing

      - name: Run E2E tests
        run: |
          pytest tests/e2e/ \
            -v \
            --cov=app \
            --cov-append \
            --cov-report=term-missing

      - name: Verify total coverage
        run: |
          coverage report --fail-under=90
          coverage xml -o test-results/coverage.xml

  security:
    name: Build and Scan Image
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build test image
        run: |
          docker build \
            -t davidcruzzy03/is218-module11:test \
            .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: davidcruzzy03/is218-module11:test
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

  deploy:
    name: Push to Docker Hub
    needs: security
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            davidcruzzy03/is218-module11:latest
            davidcruzzy03/is218-module11:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max